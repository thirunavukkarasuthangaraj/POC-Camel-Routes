# ══════════════════════════════════════════════════════════════
# CI — Build & Test
# Runs on every push and every PR to main.
# Builds the Java bridge (Maven) and checks the Python SCADA API.
# ══════════════════════════════════════════════════════════════

name: CI — Build & Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:

  # ── Java Bridge ─────────────────────────────────────────────
  build-bridge:
    name: Build Java Bridge
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tms

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Build & Test
        run: mvn verify -B

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: bridge-jar
          path: tms/target/PAS-SCADA-Kafka-Bridge-*.jar
          retention-days: 7

  # ── Python SCADA API ─────────────────────────────────────────
  build-scada-api:
    name: Check Python SCADA API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: external-scada/scada-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile app.py && echo "app.py OK"
