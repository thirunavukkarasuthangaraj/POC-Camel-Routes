# Single-replica monitor pod. State lives on a PVC; the deployment uses
# Recreate strategy so two replicas never write to the same state file.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pas-scada-monitor
  namespace: pinkline
  labels:
    app: pas-scada-monitor
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: pas-scada-monitor
  template:
    metadata:
      labels:
        app: pas-scada-monitor
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: monitor
          image: pinkline/pas-scada-monitor:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080

          # ── Non-sensitive config from ConfigMap ───────────────
          env:
            - name: SMTP_HOST
              valueFrom: { configMapKeyRef: { name: monitor-config, key: SMTP_HOST } }
            - name: SMTP_PORT
              valueFrom: { configMapKeyRef: { name: monitor-config, key: SMTP_PORT } }
            - name: SMTP_TLS
              valueFrom: { configMapKeyRef: { name: monitor-config, key: SMTP_TLS } }
            - name: SMTP_SSL
              valueFrom: { configMapKeyRef: { name: monitor-config, key: SMTP_SSL } }
            - name: SMTP_FROM
              valueFrom: { configMapKeyRef: { name: monitor-config, key: SMTP_FROM } }
            - name: SMTP_TO
              valueFrom: { configMapKeyRef: { name: monitor-config, key: SMTP_TO } }
            - name: ALERT_PREFIX
              valueFrom: { configMapKeyRef: { name: monitor-config, key: ALERT_PREFIX } }

            # ── Sensitive credentials from Secret ───────────────
            - name: SMTP_USER
              valueFrom: { secretKeyRef: { name: monitor-secret, key: SMTP_USER } }
            - name: SMTP_PASS
              valueFrom: { secretKeyRef: { name: monitor-secret, key: SMTP_PASS } }
            - name: RABBITMQ_USER
              valueFrom: { secretKeyRef: { name: monitor-secret, key: RABBITMQ_USER } }
            - name: RABBITMQ_PASS
              valueFrom: { secretKeyRef: { name: monitor-secret, key: RABBITMQ_PASS } }

          volumeMounts:
            - name: config
              mountPath: /etc/monitor/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: state
              mountPath: /var/state

          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10

          resources:
            requests:
              memory: "64Mi"
              cpu:    "50m"
            limits:
              memory: "128Mi"
              cpu:    "200m"

      volumes:
        - name: config
          configMap:
            name: monitor-config
            items:
              - key: config.yaml
                path: config.yaml
        - name: state
          persistentVolumeClaim:
            claimName: monitor-state

---
# Optional: expose /state for browser inspection of current health snapshot.
# Cluster-internal only — do not expose externally without auth.
apiVersion: v1
kind: Service
metadata:
  name: pas-scada-monitor
  namespace: pinkline
  labels:
    app: pas-scada-monitor
spec:
  selector:
    app: pas-scada-monitor
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
