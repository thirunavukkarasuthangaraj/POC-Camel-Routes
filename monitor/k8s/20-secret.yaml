# Monitor Secret — SMTP credentials + RabbitMQ probe credentials.
#
# WARNING: replace the placeholder values before applying.
# Generate with: kubectl create secret generic monitor-secret \
#   --namespace pinkline \
#   --from-literal=SMTP_USER='alerts@example.com' \
#   --from-literal=SMTP_PASS='your-app-password' \
#   --from-literal=RABBITMQ_USER='thiru' \
#   --from-literal=RABBITMQ_PASS='password' \
#   --dry-run=client -o yaml > 20-secret.yaml
#
# Gmail: enable 2FA, create an App Password, use that as SMTP_PASS.
# Office365: SMTP_HOST=smtp.office365.com, SMTP_PORT=587, SMTP_TLS=true.

apiVersion: v1
kind: Secret
metadata:
  name: monitor-secret
  namespace: pinkline
type: Opaque
stringData:
  SMTP_USER:     "REPLACE_ME@example.com"
  SMTP_PASS:     "REPLACE_ME"
  RABBITMQ_USER: "thiru"
  RABBITMQ_PASS: "password"
