apiVersion: apps/v1
kind: Deployment
metadata:
  name: pas-scada-demo
  namespace: pinkline
  labels:
    app: pas-scada-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pas-scada-demo
  template:
    metadata:
      labels:
        app: pas-scada-demo
    spec:
      containers:
        - name: demo
          image: pinkline/pas-scada-demo:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8090
          envFrom:
            - configMapRef: { name: demo-config }
          livenessProbe:
            httpGet: { path: /healthz, port: 8090 }
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /healthz, port: 8090 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { memory: "64Mi",  cpu: "50m"  }
            limits:   { memory: "128Mi", cpu: "200m" }
---
apiVersion: v1
kind: Service
metadata:
  name: pas-scada-demo
  namespace: pinkline
  labels:
    app: pas-scada-demo
spec:
  selector:
    app: pas-scada-demo
  ports:
    - name: http
      port: 8090
      targetPort: 8090
  type: ClusterIP
