apiVersion: apps/v1
kind: Deployment
metadata:
  name: pas-scada-bridge
  namespace: pinkline
  labels:
    app: pas-scada-bridge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pas-scada-bridge
  template:
    metadata:
      labels:
        app: pas-scada-bridge
    spec:
      containers:
        - name: pas-scada-bridge
          image: pinkline/pas-scada-bridge:latest
          # Never = use only the locally-built image (Docker Desktop k8s
          # shares the host Docker daemon, so this works out of the box).
          # For AKS/registry-pull, switch to IfNotPresent.
          imagePullPolicy: Never
          ports:
            - containerPort: 8085

          # ── Non-sensitive config from ConfigMap ──────────
          # Provides: SPRING_PROFILES_ACTIVE, ARTEMIS_HOST/PORT,
          #           KAFKA_HOST/PORT, RABBITMQ_HOST/PORT, MQTT_HOST/PORT
          envFrom:
            - configMapRef:
                name: bridge-config

          # ── Mounted application.properties (all topics/sinks live here)
          # ConfigMap bridge-appprops → /app/config/application.properties
          # Spring loads it via SPRING_CONFIG_ADDITIONAL_LOCATION below,
          # so any edit + apply + rollout restart picks up new topics
          # with NO image rebuild.
          volumeMounts:
            - name: appprops
              mountPath: /app/config/application.properties
              subPath: application.properties
              readOnly: true
            # TLS truststore (Secret bridge-tls-truststore; optional —
            # mounts empty when the secret doesn't exist, e.g. local)
            - name: truststore
              mountPath: /etc/ssl/bridge
              readOnly: true

          # ── Sensitive config from Secret ─────────────────
          # Provides: ARTEMIS_USER/PASS, RABBITMQ_USER/PASS,
          #           MQTT_USER/PASS, SCADA_AES_KEY
          env:
            - name: SPRING_CONFIG_ADDITIONAL_LOCATION
              value: "file:/app/config/application.properties"
            - name: SCADA_AES_KEY
              valueFrom:
                secretKeyRef:
                  name: bridge-secret
                  key: SCADA_AES_KEY
            - name: ARTEMIS_USER
              valueFrom:
                secretKeyRef:
                  name: bridge-secret
                  key: ARTEMIS_USER
            - name: ARTEMIS_PASS
              valueFrom:
                secretKeyRef:
                  name: bridge-secret
                  key: ARTEMIS_PASS
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: bridge-secret
                  key: RABBITMQ_USER
            - name: RABBITMQ_PASS
              valueFrom:
                secretKeyRef:
                  name: bridge-secret
                  key: RABBITMQ_PASS
            - name: MQTT_USER
              valueFrom:
                secretKeyRef:
                  name: bridge-secret
                  key: MQTT_USER
            - name: MQTT_PASS
              valueFrom:
                secretKeyRef:
                  name: bridge-secret
                  key: MQTT_PASS
            # Truststore password — optional so non-TLS envs don't need the key
            - name: TLS_TRUSTSTORE_PASS
              valueFrom:
                secretKeyRef:
                  name: bridge-secret
                  key: TLS_TRUSTSTORE_PASS
                  optional: true

          # ── Health checks ─────────────────────────────────
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8085
            initialDelaySeconds: 180
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8085
            initialDelaySeconds: 120
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10

          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

      volumes:
        - name: appprops
          configMap:
            name: bridge-appprops
            items:
              - key: application.properties
                path: application.properties
        # TLS truststore — optional: pods still start where the secret
        # doesn't exist (mounts as empty dir); create it for TLS brokers:
        #   keytool -importcert -alias artemis -file broker.pem \
        #     -keystore truststore.jks -storepass <pass> -noprompt
        #   kubectl -n pinkline create secret generic bridge-tls-truststore \
        #     --from-file=truststore.jks
        - name: truststore
          secret:
            secretName: bridge-tls-truststore
            optional: true

---
apiVersion: v1
kind: Service
metadata:
  name: pas-scada-bridge
  namespace: pinkline
spec:
  selector:
    app: pas-scada-bridge
  ports:
    - port: 8085
      targetPort: 8085
  type: ClusterIP
