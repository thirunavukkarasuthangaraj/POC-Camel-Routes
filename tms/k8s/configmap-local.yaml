apiVersion: v1
kind: ConfigMap
metadata:
  name: bridge-config
  namespace: pinkline
data:
  # ── LOCAL K8s override ─────────────────────────────────────────────────────
  # Use this when running the bridge in Docker Desktop Kubernetes
  # while the infra (Artemis, Kafka, RabbitMQ) runs via docker-compose.
  #
  # host.docker.internal resolves to the host machine from inside any
  # Docker Desktop container (both plain Docker and K8s pods).
  # ──────────────────────────────────────────────────────────────────────────
  SPRING_PROFILES_ACTIVE: "prod"

  ARTEMIS_HOST: "host.docker.internal"
  ARTEMIS_PORT: "61616"

  KAFKA_HOST: "host.docker.internal"
  KAFKA_PORT: "9092"

  RABBITMQ_HOST: "host.docker.internal"
  RABBITMQ_PORT: "5672"

  MQTT_HOST: "host.docker.internal"
  MQTT_PORT: "1883"
