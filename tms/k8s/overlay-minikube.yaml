apiVersion: v1
kind: ConfigMap
metadata:
  name: bridge-config
  namespace: pinkline
data:
  SPRING_PROFILES_ACTIVE: "prod"

  ARTEMIS_HOST: "artemis-service.pinkline.svc.cluster.local"
  ARTEMIS_PORT: "61616"
  SPRING_ACTIVEMQ_BROKER_URL: "tcp://artemis-service.pinkline.svc.cluster.local:61616"
  SPRING_ACTIVEMQ_USER: "admin"
  SPRING_ACTIVEMQ_PASSWORD: "admin"

  KAFKA_HOST: "kafka-service.pinkline.svc.cluster.local"
  KAFKA_PORT: "9092"

  RABBITMQ_HOST: "rabbitmq-internal.scada.svc.cluster.local"
  RABBITMQ_PORT: "5672"

  MQTT_HOST: "rabbitmq-internal.scada.svc.cluster.local"
  MQTT_PORT: "1883"

  # Kafka middleman mode — Camel reads from Kafka topics produced by Connect
  # source connectors and writes to Kafka topics consumed by Connect sinks.
  # Camel does NOT integrate with external systems directly in this mode;
  # broker I/O is delegated to Kafka Connect. See connect/README.md.
  BRIDGE_INPUT_FROM_KAFKA: "true"
  BRIDGE_REVERSE_KAFKA_ENABLED: "true"
  BRIDGE_PIPELINE: "kafka"
  BRIDGE_ARTEMIS_TOPICS: "TMS.PISInfo,RCS.E2K.TMS.TrafficReportClient,TSInfo,RCS.E2K.TMS.RouteInfo"
  BRIDGE_MONITOR_ENABLED: "true"
  BRIDGE_MONITOR_FROM_EXCHANGE: "amq.topic"
  BRIDGE_MONITOR_ROUTING_KEY: "tms.scada.pas"
  BRIDGE_MONITOR_QUEUE: "scada.monitor.queue"
---
apiVersion: v1
kind: Secret
metadata:
  name: bridge-secret
  namespace: pinkline
type: Opaque
stringData:
  ARTEMIS_USER: "admin"
  ARTEMIS_PASS: "admin"
  RABBITMQ_USER: "thiru"
  RABBITMQ_PASS: "password"
  MQTT_USER: "thiru"
  MQTT_PASS: "password"
  SCADA_AES_KEY: "k7Qh2NfT8vR0mC9aXy4pLwZbE3sG6uJtH1iKd5oArMw="
