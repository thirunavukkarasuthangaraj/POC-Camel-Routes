# ════════════════════════════════════════════════
# PAS-SCADA-Kafka-Bridge — Common Base Configuration
#
# This file contains settings shared across ALL environments.
# Environment-specific values live in:
#   application-local.properties     (local Docker)
#   application-dev.properties       (development server)
#   application-staging.properties   (staging server)
#   application-prod.properties      (production server)
#
# Activate profile:
#   export SPRING_PROFILES_ACTIVE=prod      (Linux/server)
#   -Dspring.profiles.active=local          (Maven local run)
# ════════════════════════════════════════════════

spring.application.name=PAS-SCADA-Kafka-Bridge
server.port=8085

# ════════════════════════════════════════════════════════════════
# PIPELINE — controls the full delivery chain from Artemis
#
# Change this one line to rewire the entire topology.
# Supported steps: kafka, rabbitmq, mqtt
# Order matters — message is delivered to each sink in listed order.
#
#   kafka,rabbitmq,mqtt  →  full chain (Artemis → Kafka → RabbitMQ → MQTT)
#   mqtt                 →  direct (Artemis → MQTT, skip brokers)
#   kafka,mqtt           →  Kafka audit + direct MQTT
#   kafka,rabbitmq       →  store in brokers, no MQTT
#   kafka                →  Kafka only
# ════════════════════════════════════════════════════════════════
bridge.pipeline=${BRIDGE_PIPELINE:kafka,rabbitmq,mqtt}

# ── Encryption ────────────────────────────────────────────────────────
# true  = AES-256-GCM encrypt before sending (requires SCADA_AES_KEY env var)
# false = plain JSON forwarded — use only for local testing
bridge.encrypt.enabled=true

# ── Artemis topics (one Camel route created per topic) ───────────
bridge.artemis-topics=
TMS.PISInfo,  - 
RCS.E2K.TMS.TrafficReportClient,
TSInfo,
RCS.E2K.TMS.RouteInfo

jms.topic.TMS.PISInfo
jms.topic.RCS.E2K.TMS.TrafficReportClient
jms.topic.TSInfo
jms.topic.RCS.E2K.TMS.RouteInfo



# ── Kafka sink (used when 'kafka' is in pipeline) ─────────────────
bridge.kafka.topic=tms.scada.encrypted

# ── Connect-mode input (Kafka source instead of Artemis) ─────────────
# Flip BRIDGE_INPUT_FROM_KAFKA=true once a Kafka Connect Artemis-source
# is producing to BRIDGE_INPUT_KAFKA_TOPIC. The Artemis-direct loop
# above is then SKIPPED and this single Kafka consumer route runs the
# same XmlToJson + Encrypt processors.
bridge.input-kafka.enabled=${BRIDGE_INPUT_FROM_KAFKA:false}
bridge.input-kafka.topic=${BRIDGE_INPUT_KAFKA_TOPIC:tms.raw}
bridge.input-kafka.consumer-group=${BRIDGE_INPUT_KAFKA_GROUP:pas-bridge-transform}

# ── Reverse Kafka path (SCADA → TMS via Kafka) ───────────────────────
# Flip BRIDGE_REVERSE_KAFKA_ENABLED=true once a Kafka Connect RabbitMQ-
# source is producing to BRIDGE_REVERSE_KAFKA_INPUT. This route decrypts,
# optionally converts JSON → XML, and writes BRIDGE_REVERSE_KAFKA_OUTPUT
# where a Connect Artemis-sink can drain it back to TMS.
bridge.reverse-kafka.enabled=${BRIDGE_REVERSE_KAFKA_ENABLED:false}
bridge.reverse-kafka.input-topic=${BRIDGE_REVERSE_KAFKA_INPUT:scada.tms.raw}
bridge.reverse-kafka.output-topic=${BRIDGE_REVERSE_KAFKA_OUTPUT:scada.tms.processed}
bridge.reverse-kafka.consumer-group=${BRIDGE_REVERSE_KAFKA_GROUP:pas-bridge-reverse}
bridge.reverse-kafka.convert-to-xml=${BRIDGE_REVERSE_KAFKA_CONVERT_TO_XML:false}

# ── RabbitMQ sink (used when 'rabbitmq' is in pipeline) ──────────
bridge.rabbitmq-out.exchange=amq.topic
bridge.rabbitmq-out.routing-key=tms.scada.pas

# ── MQTT direct sink (used when 'mqtt' is in pipeline) ───────────
# broker-url and credentials set per environment (see application-*.properties)
bridge.mqtt.topic=tms/scada/pas
bridge.mqtt.qos=1
bridge.mqtt.client-id=camel-paho-bridge

# ── Relay routes: Kafka → RabbitMQ (optional) ─────────────────────
# Only needed when Kafka must be a true relay (not just write-through).
# With pipeline write-through, leave this empty.
# Uncomment to enable:
# bridge.forward[0].from-kafka=tms.scada.encrypted
# bridge.forward[0].to-exchange=amq.topic
# bridge.forward[0].routing-key=tms.scada.pas
# bridge.forward[0].consumer-group=pas-bridge-consumer

# ── Inbound routes: RabbitMQ/MQTT → Artemis (SCADA → TMS direction) ──
# SCADA API publishes RSAE JSON to MQTT "scada/tms/alarms".
# RabbitMQ MQTT plugin maps it to routing key "scada.tms.alarms" on amq.topic.
# Bridge consumes from the queue and forwards to Artemis for TMS.
#
# convert-to-xml=true  → Camel converts RSAE JSON to XML before Artemis
# convert-to-xml=false → forward JSON as-is (default)
bridge.inbound[0].from-exchange=amq.topic
bridge.inbound[0].routing-key=scada.tms.alarms
bridge.inbound[0].queue=scada.tms.alarms.queue
bridge.inbound[0].to-topic=SCADA.TMS.Alarms
bridge.inbound[0].convert-to-xml=false

# ── Monitor: in-bridge API feed (optional) ────────────────────────
# Feeds /api/messages inside this app. For production use SCADA-API instead.
bridge.monitor.enabled=${BRIDGE_MONITOR_ENABLED:false}
bridge.monitor.from-exchange=${BRIDGE_MONITOR_FROM_EXCHANGE:amq.topic}
bridge.monitor.routing-key=${BRIDGE_MONITOR_ROUTING_KEY:tms.scada.pas}
bridge.monitor.queue=${BRIDGE_MONITOR_QUEUE:scada.monitor.queue}

# ── Camel ─────────────────────────────────────────
camel.springboot.main-run-controller=true

# ── Auto-reconnect: supervising route controller ──
# Any route that fails to start (broker down, DNS, auth) keeps retrying
# in the background with exponential backoff instead of killing the app.
# Applies to ALL routes — Artemis consumers, Kafka, RabbitMQ, MQTT, inbound.
camel.springboot.route-controller-supervise-enabled=true
camel.springboot.route-controller-initial-delay=0
camel.springboot.route-controller-back-off-delay=5000
camel.springboot.route-controller-back-off-max-delay=60000
camel.springboot.route-controller-back-off-multiplier=2.0
camel.springboot.route-controller-unhealthy-on-exhausted=false

# ── Actuator — Camel route monitoring + health ────
# Routes:    http://localhost:8085/actuator/camelroutes
# Health:    http://localhost:8085/actuator/health
# Liveness:  http://localhost:8085/actuator/health/liveness
# Readiness: http://localhost:8085/actuator/health/readiness
# Metrics:   http://localhost:8085/actuator/metrics
# Info:      http://localhost:8085/actuator/info
management.endpoints.web.exposure.include=health,info,camelroutes,metrics,loggers,env,beans
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Enable Camel health checks — surfaces per-route + consumer status
# under /actuator/health (routes: UP/DOWN with reason on reconnect).
camel.health.enabled=true
camel.health.routes-enabled=true
camel.health.consumers-enabled=true
camel.health.producers-enabled=true
camel.health.registry-enabled=true

# Keep broker health checks ON so /actuator/health reflects reconnect state.
management.health.rabbit.enabled=true
management.health.jms.enabled=true
management.health.kafka.enabled=true
