# PAS-SCADA-Kafka-Bridge — base config (env overrides in application-<profile>.properties)

spring.application.name=PAS-SCADA-Kafka-Bridge
server.port=8085

# ── Forward pipeline (Artemis → ...) ──────────────────────────────
# Steps: kafka,rabbitmq,mqtt (any order, any subset). Default: kafka only
# (staged — relay below drains Kafka → RabbitMQ; MQTT auto via RMQ plugin).
bridge.pipeline=${BRIDGE_PIPELINE:kafka}
bridge.encrypt.enabled=true

# ── Artemis topics (one outbound route per topic) ─────────────────
bridge.artemis-topics=TMS.PISInfo,RCS.E2K.TMS.TrafficReportClient,TSInfo,RCS.E2K.TMS.RouteInfo

# ── Forward sinks ─────────────────────────────────────────────────
bridge.kafka.topic=tms.scada.encrypted
bridge.rabbitmq-out.exchange=amq.topic
bridge.rabbitmq-out.routing-key=tms.scada.pas
bridge.mqtt.topic=tms/scada/pas
bridge.mqtt.qos=1
bridge.mqtt.client-id=camel-paho-bridge

# ── Stage 2 forward: Kafka → RabbitMQ relay ───────────────────────
bridge.forward[0].from-kafka=tms.scada.encrypted
bridge.forward[0].to-exchange=amq.topic
bridge.forward[0].routing-key=tms.scada.pas
bridge.forward[0].consumer-group=pas-bridge-consumer

# ── Reverse staged flow (SCADA → TMS) ─────────────────────────────
# B: RabbitMQ → Kafka
bridge.scada-source[0].from-exchange=amq.topic
bridge.scada-source[0].routing-key=scada.tms.alarms
bridge.scada-source[0].queue=scada.tms.alarms.queue
bridge.scada-source[0].to-kafka-topic=scada.tms.raw
# C: Kafka → decrypt → Kafka
bridge.reverse-kafka.enabled=${BRIDGE_REVERSE_KAFKA_ENABLED:true}
bridge.reverse-kafka.input-topic=scada.tms.raw
bridge.reverse-kafka.output-topic=scada.tms.processed
bridge.reverse-kafka.consumer-group=pas-bridge-reverse
bridge.reverse-kafka.convert-to-xml=false
# D: Kafka → Artemis
bridge.artemis-sink[0].from-kafka=scada.tms.processed
bridge.artemis-sink[0].consumer-group=pas-bridge-artemis-sink
bridge.artemis-sink[0].to-topic=SCADA.TMS.Alarms

# ── Compacted alarm-state topic (for /api/snapshot/replay) ────────
bridge.alarm-state.enabled=${BRIDGE_ALARM_STATE_ENABLED:true}
bridge.alarm-state.topic=scada.tms.alarms.state

# ── In-bridge monitor API (/api/messages) — optional ──────────────
bridge.monitor.enabled=${BRIDGE_MONITOR_ENABLED:false}
bridge.monitor.from-exchange=amq.topic
bridge.monitor.routing-key=tms.scada.pas
bridge.monitor.queue=scada.monitor.queue

# ── Camel route controller (auto-reconnect with backoff) ──────────
camel.springboot.main-run-controller=true
camel.springboot.route-controller-supervise-enabled=true
camel.springboot.route-controller-initial-delay=0
camel.springboot.route-controller-back-off-delay=5000
camel.springboot.route-controller-back-off-max-delay=60000
camel.springboot.route-controller-back-off-multiplier=2.0
camel.springboot.route-controller-unhealthy-on-exhausted=false

# ── Actuator + health ─────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,camelroutes,metrics,loggers,env,beans
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.health.rabbit.enabled=true
management.health.jms.enabled=true
management.health.kafka.enabled=true
camel.health.enabled=true
camel.health.routes-enabled=true
camel.health.consumers-enabled=true
camel.health.producers-enabled=true
camel.health.registry-enabled=true
