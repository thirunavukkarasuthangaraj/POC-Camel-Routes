# ════════════════════════════════════════════════
# LOCAL profile — Docker on localhost
# Run: mvn spring-boot:run -Dspring.profiles.active=local
#
# No TLS. No env vars needed. All values hardcoded for quick local testing.
# ════════════════════════════════════════════════

# ── TLS — disabled ────────────────────────────────
tls.truststore.path=
tls.truststore.password=

# ── ActiveMQ Artemis ──────────────────────────────
camel.component.activemq.broker-url=tcp://localhost:61616
# credentials go here — NOT under camel.component.activemq.* to avoid SingleConnectionFactory conflict
artemis.username=pasbridge
artemis.password=testpass123

# ── Kafka ─────────────────────────────────────────
kafka.brokers=localhost:9092
camel.component.kafka.brokers=${kafka.brokers}
camel.component.kafka.security-protocol=PLAINTEXT

# ── RabbitMQ ──────────────────────────────────────
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=admin
spring.rabbitmq.password=admin
spring.rabbitmq.ssl.enabled=false

# ── Encryption (local: off — see plain JSON in MQTT Explorer / Kafdrop) ──
bridge.encrypt.enabled=false

# ── Pipeline (local: direct Artemis → MQTT, skip Kafka + RabbitMQ) ──
# Change to kafka,rabbitmq,mqtt to test the full chain locally.
bridge.pipeline=mqtt
bridge.mqtt.broker-url=tcp://localhost:1883
# RabbitMQ MQTT plugin uses these credentials:
bridge.mqtt.username=admin
bridge.mqtt.password=admin

# ── Inbound: SCADA → TMS (local: JSON pass-through, no XML conversion) ──
bridge.inbound[0].from-exchange=amq.topic
bridge.inbound[0].routing-key=scada.tms.alarms
bridge.inbound[0].queue=scada.tms.alarms.queue
bridge.inbound[0].to-topic=SCADA.TMS.Alarms
bridge.inbound[0].convert-to-xml=false

# ── Logging ───────────────────────────────────────
logging.level.com.pinkline.kafkabridge=DEBUG
logging.level.org.apache.camel=DEBUG
logging.level.org.apache.activemq=DEBUG
