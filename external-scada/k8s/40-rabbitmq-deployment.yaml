# ═══════════════════════════════════════════════════════════════════
# RabbitMQ — SCADA-side broker (MQTT + AMQP)
#
# Bridge on TMS VM connects here cross-VM over AMQP 5672.
# SCADA API / edge devices connect over MQTT 1883 (or 15675 WS).
# Management UI on 15672 for ops visibility.
#
# Plugins enabled via ConfigMap: rabbitmq_mqtt, rabbitmq_web_mqtt,
# rabbitmq_management (already included in the 3.12-management image).
# ═══════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: scada
  labels:
    app: rabbitmq
spec:
  replicas: 1
  strategy:
    type: Recreate                # single-writer on PVC — no rolling update
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.12-management
          ports:
            - containerPort: 5672
              name: amqp
            - containerPort: 1883
              name: mqtt
            - containerPort: 15672
              name: http-mgmt
            - containerPort: 15675
              name: ws-mqtt
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: RABBITMQ_DEFAULT_USER
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: RABBITMQ_DEFAULT_PASS
            - name: RABBITMQ_ERLANG_COOKIE
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: RABBITMQ_ERLANG_COOKIE
          volumeMounts:
            - name: data
              mountPath: /var/lib/rabbitmq
            - name: config
              mountPath: /etc/rabbitmq/enabled_plugins
              subPath: enabled_plugins
            - name: config
              mountPath: /etc/rabbitmq/rabbitmq.conf
              subPath: rabbitmq.conf
          livenessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "ping"]
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 15
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "check_port_connectivity"]
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
          resources:
            requests: { memory: "512Mi", cpu: "250m" }
            limits:   { memory: "1Gi",   cpu: "500m" }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: rabbitmq-data
        - name: config
          configMap:
            name: rabbitmq-config
