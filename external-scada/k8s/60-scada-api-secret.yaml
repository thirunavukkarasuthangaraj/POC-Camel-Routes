# ═══════════════════════════════════════════════════════════════════
# SCADA API Secret — AES key for decryption + MQTT credentials
# DevOps: replace all REPLACE values before applying.
#
# Generate AES key:
#   openssl rand -base64 32
#
# Must match the SCADA_AES_KEY in tms/k8s/secret.yaml (bridge uses
# this key to encrypt, SCADA API uses the same key to decrypt).
# ═══════════════════════════════════════════════════════════════════
apiVersion: v1
kind: Secret
metadata:
  name: scada-api-secret
  namespace: scada
type: Opaque
stringData:
  SCADA_AES_KEY: "k7Qh2NfT8vR0mC9aXy4pLwZbE3sG6uJtH1iKd5oArMw="
  MQTT_USER: "thiru"
  MQTT_PASS: "password"
