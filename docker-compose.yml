version: '3.8'

# ════════════════════════════════════════════════════════════
# PAS-SCADA-Kafka-Bridge — Local Test Environment
#
# Starts all 3 servers locally so you can test without
# connecting to the real Pink Line servers.
#
# Run:  docker-compose up -d
# Stop: docker-compose down
# ════════════════════════════════════════════════════════════

services:

  # ── ActiveMQ Artemis (replaces 10.12.1.13:61616) ──────────
  # TMS publishes XML to topics on this broker.
  # In test: we publish test XML manually.
  artemis:
    image: apache/activemq-artemis:2.31.2
    container_name: test-artemis
    ports:
      - "61616:61616"    # OpenWire (our app connects here)
      - "8161:8161"      # Web console (open in browser to see messages)
    environment:
      ARTEMIS_USER: pasbridge
      ARTEMIS_PASSWORD: testpass123
      ANONYMOUS_LOGIN: "false"
    volumes:
      - artemis-data:/var/lib/artemis-instance

  # ── Apache Kafka (Bala confirmed: use Kafka) ───────────────
  # Our app publishes encrypted messages to Kafka topic.
  # Needs Zookeeper to run.
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: test-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_INIT_LIMIT: 10
      ZOOKEEPER_SYNC_LIMIT: 5
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: test-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"      # Our app connects here
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ZOOKEEPER_SESSION_TIMEOUT_MS: "60000"
      KAFKA_ZOOKEEPER_CONNECTION_TIMEOUT_MS: "60000"
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://host.docker.internal:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,INTERNAL://0.0.0.0:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"   # auto-creates tms.scada.encrypted

  # ── RabbitMQ (client already uses this) ───────────────────
  # Our app forwards encrypted messages here.
  # MQTT plugin enabled so SCADA API can connect.
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: test-rabbitmq
    ports:
      - "5672:5672"      # AMQP (our app connects here)
      - "1883:1883"      # MQTT (SCADA API connects here — port 8883 in prod with TLS)
      - "15672:15672"    # Web console (open in browser to see messages)
      - "15675:15675"    # MQTT over WebSocket (browser SCADA stream viewer)
    environment:
      RABBITMQ_DEFAULT_USER: thiru
      RABBITMQ_DEFAULT_PASS: password
    command: >
      bash -c "rabbitmq-plugins enable rabbitmq_mqtt rabbitmq_web_mqtt &&
               rabbitmq-server"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  # ── Kafdrop (Kafka Web UI) ────────────────────────
  # Browse topics, messages, and consumer groups in browser.
  # Open: http://localhost:9000
  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: test-kafdrop
    depends_on:
      - kafka
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: kafka:29092
      JVM_OPTS: "-Xms32M -Xmx64M"

  # ── Bridge App ────────────────────────────────────
  # The PAS-SCADA-Kafka-Bridge itself.
  # Built from local Dockerfile; uses prod profile with service hostnames.
  # Health: http://localhost:8085/actuator/health
  bridge:
    build: .
    container_name: pas-scada-bridge
    depends_on:
      - artemis
      - kafka
      - rabbitmq
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: "prod"
      # ActiveMQ Artemis
      ARTEMIS_HOST: artemis
      ARTEMIS_PORT: "61616"
      ARTEMIS_USER: pasbridge
      ARTEMIS_PASS: testpass123
      # Kafka — use internal inter-container listener
      KAFKA_HOST: kafka
      KAFKA_PORT: "29092"
      # RabbitMQ + MQTT plugin
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: thiru
      RABBITMQ_PASS: password
      MQTT_HOST: rabbitmq
      MQTT_PORT: "1883"
      MQTT_USER: thiru
      MQTT_PASS: password
      # Encryption — local test key (32 zero bytes base64, NOT for prod)
      SCADA_AES_KEY: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
      # Pipeline — kafka+rabbitmq only (RabbitMQ MQTT plugin handles MQTT delivery)
      BRIDGE_PIPELINE: "kafka,rabbitmq"
      # Monitor — feeds /api/messages and /api/messages/stream
      BRIDGE_MONITOR_ENABLED: "true"
      BRIDGE_MONITOR_FROM_EXCHANGE: "amq.topic"
      BRIDGE_MONITOR_ROUTING_KEY: "tms.scada.pas"
      BRIDGE_MONITOR_QUEUE: "scada.monitor.queue"

volumes:
  artemis-data:
  rabbitmq-data:
