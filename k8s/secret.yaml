apiVersion: v1
kind: Secret
metadata:
  name: bridge-secret
  namespace: pinkline
type: Opaque
# Use stringData — K8s will base64 encode automatically
# Replace all REPLACE values before applying
stringData:
  # artemis.username=${ARTEMIS_USER}
  # artemis.password=${ARTEMIS_PASS}
  ARTEMIS_USER: "REPLACE"
  ARTEMIS_PASS: "REPLACE"

  # camel.component.kafka.sasl-jaas-config uses ${KAFKA_USER} / ${KAFKA_PASS}
  KAFKA_USER: "REPLACE"
  KAFKA_PASS: "REPLACE"

  # spring.rabbitmq.username=${RABBITMQ_USER}
  # spring.rabbitmq.password=${RABBITMQ_PASS}
  RABBITMQ_USER: "REPLACE"
  RABBITMQ_PASS: "REPLACE"

  # bridge.mqtt.username=${MQTT_USER}
  # bridge.mqtt.password=${MQTT_PASS}
  MQTT_USER: "REPLACE"
  MQTT_PASS: "REPLACE"

  # tls.truststore.password=${TLS_TRUSTSTORE_PASS}
  TLS_TRUSTSTORE_PASS: "REPLACE"

  # EncryptProcessor reads this env var directly — System.getenv("SCADA_AES_KEY")
  SCADA_AES_KEY: "REPLACE_WITH_BASE64_256BIT_KEY"
