# Credentials for every connector in the connect-config ConfigMap.
# Each connector references env vars via ${env:VAR}; the EnvVarConfigProvider
# (configured in 30-deployment.yaml) resolves them at task-start time.
#
# The default values below match the dev cluster — replace before applying
# to staging/production. Generate via:
#   kubectl -n pinkline create secret generic connect-secret \
#     --from-literal=ARTEMIS_USER='pasbridge' \
#     --from-literal=ARTEMIS_PASSWORD='testpass123' \
#     --from-literal=RABBITMQ_USER='thiru' \
#     --from-literal=RABBITMQ_PASS='password' \
#     --from-literal=MQTT_USER='thiru' \
#     --from-literal=MQTT_PASS='password' \
#     --dry-run=client -o yaml > 10-secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: connect-secret
  namespace: pinkline
type: Opaque
stringData:
  ARTEMIS_USER:     "admin"
  ARTEMIS_PASSWORD: "admin"
  RABBITMQ_USER:    "thiru"
  RABBITMQ_PASS:    "password"
  MQTT_USER:        "thiru"
  MQTT_PASS:        "password"
