# ════════════════════════════════════════════════
# PAS-SCADA-Kafka-Bridge — Production Configuration
#
# Set these environment variables on the server before starting:
#   SCADA_AES_KEY  — base64 encoded 256-bit AES key
#   ARTEMIS_PASS   — Artemis password for user: pasbridge
#   KAFKA_PASS     — Kafka password for user: tms_bridge
#   RABBITMQ_PASS  — RabbitMQ password for user: tms_bridge
# ════════════════════════════════════════════════

spring.application.name=PAS-SCADA-Kafka-Bridge
server.port=8085

# ── ActiveMQ Artemis ─────────────────────────────
camel.component.activemq.broker-url=tcp://10.12.1.13:61616
camel.component.activemq.username=pasbridge
camel.component.activemq.password=${ARTEMIS_PASS}

# ── Kafka ─────────────────────────────────────────
kafka.brokers=10.12.1.14:9092
camel.component.kafka.brokers=${kafka.brokers}
camel.component.kafka.security-protocol=SASL_PLAINTEXT
camel.component.kafka.sasl-mechanism=PLAIN
camel.component.kafka.sasl-jaas-config=org.apache.kafka.common.security.plain.PlainLoginModule required \
  username="tms_bridge" \
  password="${KAFKA_PASS}";

# ── RabbitMQ ──────────────────────────────────────
spring.rabbitmq.host=10.12.1.11
spring.rabbitmq.port=5672
spring.rabbitmq.username=tms_bridge
spring.rabbitmq.password=${RABBITMQ_PASS}

# ── Camel ─────────────────────────────────────────
camel.springboot.main-run-controller=true

# ── Logging ───────────────────────────────────────
logging.level.com.pinkline.kafkabridge=INFO
logging.level.org.apache.camel=INFO
logging.level.org.apache.activemq=WARN
