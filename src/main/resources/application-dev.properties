# ════════════════════════════════════════════════
# DEV profile — Development server
# Activate: export SPRING_PROFILES_ACTIVE=dev
#
# Required env vars on dev server:
#   ARTEMIS_HOST, ARTEMIS_PORT, ARTEMIS_USER, ARTEMIS_PASS
#   KAFKA_HOST, KAFKA_PORT, KAFKA_USER, KAFKA_PASS
#   RABBITMQ_HOST, RABBITMQ_PORT, RABBITMQ_USER, RABBITMQ_PASS
#   TLS_TRUSTSTORE_PATH, TLS_TRUSTSTORE_PASS
#   SCADA_AES_KEY
# ════════════════════════════════════════════════

# ── TLS — disabled for now, DevOps will enable via K8s Secrets ───
# tls.truststore.path=${TLS_TRUSTSTORE_PATH}
# tls.truststore.password=${TLS_TRUSTSTORE_PASS}

# ── ActiveMQ Artemis ──────────────────────────────
camel.component.activemq.broker-url=tcp://${ARTEMIS_HOST}:${ARTEMIS_PORT}
artemis.username=${ARTEMIS_USER}
artemis.password=${ARTEMIS_PASS}

# ── Kafka ─────────────────────────────────────────
kafka.brokers=${KAFKA_HOST}:${KAFKA_PORT}
camel.component.kafka.brokers=${kafka.brokers}
camel.component.kafka.security-protocol=PLAINTEXT
# TLS (enable when DevOps provides truststore):
# camel.component.kafka.security-protocol=SASL_SSL
# camel.component.kafka.sasl-mechanism=PLAIN
# camel.component.kafka.sasl-jaas-config=org.apache.kafka.common.security.plain.PlainLoginModule required username="${KAFKA_USER}" password="${KAFKA_PASS}";
# camel.component.kafka.ssl-truststore-location=${tls.truststore.path}
# camel.component.kafka.ssl-truststore-password=${tls.truststore.password}
# camel.component.kafka.ssl-truststore-type=JKS

# ── RabbitMQ ──────────────────────────────────────
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT}
spring.rabbitmq.username=${RABBITMQ_USER}
spring.rabbitmq.password=${RABBITMQ_PASS}
spring.rabbitmq.ssl.enabled=false
# TLS (enable when DevOps provides truststore):
# spring.rabbitmq.ssl.enabled=true
# spring.rabbitmq.ssl.trust-store=${tls.truststore.path}
# spring.rabbitmq.ssl.trust-store-password=${tls.truststore.password}
# spring.rabbitmq.ssl.trust-store-type=JKS
# spring.rabbitmq.ssl.validate-server-certificate=true

# ── Pipeline (dev: full chain) ────────────────────
bridge.pipeline=kafka,rabbitmq,mqtt
bridge.mqtt.broker-url=tcp://${MQTT_HOST}:${MQTT_PORT}
bridge.mqtt.username=${MQTT_USER}
bridge.mqtt.password=${MQTT_PASS}

# ── Logging — verbose for dev ─────────────────────
logging.level.com.pinkline.kafkabridge=DEBUG
logging.level.org.apache.camel=DEBUG
logging.level.org.apache.activemq=INFO
