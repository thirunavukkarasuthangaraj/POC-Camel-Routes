# ════════════════════════════════════════════════
# LOCAL TEST profile — Docker on localhost
# Run: mvn spring-boot:run -Dspring.profiles.active=local
#
# RabbitMQ login:  thiru / password
# Artemis login:   pasbridge / testpass123
# ════════════════════════════════════════════════

spring.application.name=PAS-SCADA-Kafka-Bridge
server.port=8085

# ── ActiveMQ Artemis ──────────────────────────────
camel.component.activemq.broker-url=tcp://localhost:61616
camel.component.activemq.username=pasbridge
camel.component.activemq.password=testpass123

# ── Kafka ─────────────────────────────────────────
kafka.brokers=localhost:9092
camel.component.kafka.brokers=${kafka.brokers}
camel.component.kafka.security-protocol=PLAINTEXT

# ── RabbitMQ ──────────────────────────────────────
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=thiru
spring.rabbitmq.password=password

# ── Camel ─────────────────────────────────────────
camel.springboot.main-run-controller=true

# ── Logging ───────────────────────────────────────
logging.level.com.pinkline.kafkabridge=INFO
logging.level.org.apache.camel=INFO
